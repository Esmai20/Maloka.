<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إلى ملوكة ❤️</title>
    <style>
        body { background-color: #fff0f3; text-align: center; font-family: 'Arial', sans-serif; margin: 0; padding-top: 50px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 10px 20px rgba(0,0,0,0.1); width: 85%; max-width: 400px; border: 2px solid #ffccd5; margin-bottom: 20px; }
        h1 { color: #ff4d6d; }
        p { color: #666; font-weight: bold; }
        input { width: 80%; padding: 12px; margin: 10px; border: 2px solid #ff4d6d; border-radius: 10px; text-align: center; font-size: 18px; outline: none; }
        button { background: #ff4d6d; color: white; border: none; padding: 12px 25px; border-radius: 25px; cursor: pointer; font-size: 20px; font-weight: bold; margin-top: 10px; }
        
        #surprise { display: none; padding: 20px; animation: fadeIn 1.5s; }
        
        /* تنسيق الصور تحت بعض */
        .image-post { width: 100%; max-width: 320px; margin: 30px auto; background: white; padding: 15px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); border: 2px solid #ffccd5; }
        .mySlides { width: 100%; border-radius: 15px; border: 4px solid #ff4d6d; }
        
        /* كلام الحب فوق كل صورة */
        .caption-text { color: #ff4d6d; font-size: 19px; font-weight: bold; margin-bottom: 12px; display: block; line-height: 1.4; }
        
        .love-text { font-size: 20px; color: #444; line-height: 1.6; font-weight: bold; white-space: pre-line; background: #fff; padding: 20px; border-radius: 15px; margin-top: 30px; border: 2px solid #ffccd5; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
    </style>
</head>
